<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Правда чи Дія — Брудна Свинка</title>
    
    <!-- Пухкий шрифт Nunito -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    
    <!-- Іконки Phosphor -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
        }

        body {
            /* Рожевий фон — "тіло свині" */
            background-color: #fbcfe8;
            background-image: radial-gradient(circle at center, #fbcfe8 0%, #f9a8d4 100%);
            color: #831843; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- Брудні плями (Болото) --- */
        .mud-spot {
            position: absolute;
            background-color: #78350f; /* Колір болота */
            z-index: 0;
            opacity: 0.85;
        }

        .spot-1 {
            width: 150px;
            height: 120px;
            top: -20px;
            left: -30px;
            /* Складна формула для створення нерівної, органічної форми (плями) */
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
        }

        .spot-2 {
            width: 200px;
            height: 180px;
            bottom: -50px;
            right: -40px;
            background-color: #5c2b07; /* Трохи темніше болото */
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
        }

        .spot-3 {
            width: 80px;
            height: 70px;
            top: 25%;
            right: 5%;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            transform: rotate(45deg);
        }

        .spot-4 {
            width: 110px;
            height: 90px;
            bottom: 20%;
            left: -10px;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
        }

        /* Дрібні бризки бруду */
        .mud-splash {
            position: absolute;
            background-color: #78350f;
            border-radius: 50%;
            z-index: 0;
        }

        .splash-1 { width: 15px; height: 15px; top: 15%; left: 20%; }
        .splash-2 { width: 10px; height: 10px; bottom: 30%; right: 25%; }
        .splash-3 { width: 20px; height: 15px; top: 10%; right: 35%; border-radius: 40% 60% 50% 50%; }

        /* Контейнер меню (без фону) */
        .menu-container {
            width: 100%;
            max-width: 380px;
            padding: 20px;
            text-align: center;
            position: relative;
            z-index: 10; /* Щоб меню було поверх болота */
        }

        /* --- Свинячий п'ятачок --- */
        .pig-snout {
            width: 90px;
            height: 60px;
            background-color: #f472b6; 
            border-radius: 40px;
            margin: 0 auto 15px;
            position: relative;
            box-shadow: inset 0 -5px 0 rgba(190, 24, 93, 0.2), 0 8px 15px rgba(219, 39, 119, 0.2);
            border: 3px solid #fce7f3;
        }

        /* Ніздрі */
        .nostril {
            width: 14px;
            height: 20px;
            background-color: #9d174d; 
            border-radius: 50%;
            position: absolute;
            top: 18px;
        }

        .nostril.left { left: 20px; transform: rotate(-15deg); }
        .nostril.right { right: 20px; transform: rotate(15deg); }

        /* Текст "Свиня питає" у вигляді хмарки */
        .pig-asks {
            display: inline-block;
            background: #ffffff; /* Біла хмарка, щоб виділялась на рожевому тілі */
            color: #db2777;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            position: relative;
            transform: rotate(-3deg);
            box-shadow: 0 4px 10px rgba(219, 39, 119, 0.15);
        }

        .pig-asks::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: #ffffff transparent transparent transparent;
        }

        .game-title {
            font-size: 3rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 35px;
            color: #9d174d;
            text-shadow: 2px 2px 0px rgba(255, 255, 255, 0.5); /* Біла тінь для кращого читання */
        }

        .buttons-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Кнопки */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 20px 20px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            border: none;
            transition: all 0.15s ease-in-out;
        }

        .btn i {
            font-size: 1.8rem;
        }

        /* Головна кнопка */
        .btn-primary {
            background-color: #db2777; 
            color: #ffffff;
            box-shadow: 0 8px 0 #9d174d, 0 15px 20px rgba(157, 23, 77, 0.3);
        }

        .btn-primary:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #9d174d, 0 5px 10px rgba(157, 23, 77, 0.2);
        }

        /* Другорядні кнопки (зробив їх білими, щоб добре читалися без підкладки) */
        .btn-secondary {
            background-color: #ffffff;
            color: #db2777;
            box-shadow: 0 8px 0 #f472b6, 0 15px 20px rgba(244, 114, 182, 0.2);
        }

        .btn-secondary:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #f472b6, 0 5px 10px rgba(244, 114, 182, 0.2);
        }

    </style>
</head>
<body>

    <!-- Брудні плями та бризки на "тілі свині" -->
    <div class="mud-spot spot-1"></div>
    <div class="mud-spot spot-2"></div>
    <div class="mud-spot spot-3"></div>
    <div class="mud-spot spot-4"></div>
    <div class="mud-splash splash-1"></div>
    <div class="mud-splash splash-2"></div>
    <div class="mud-splash splash-3"></div>

    <!-- Контейнер без білого фону -->
    <div class="menu-container">
        
        <div class="pig-snout">
            <div class="nostril left"></div>
            <div class="nostril right"></div>
        </div>

        <div class="pig-asks">Свиня питає:</div>
        
        <h1 class="game-title">ПРАВДА<br>ЧИ ДІЯ</h1>
        
        <div class="buttons-wrapper">
            <button class="btn btn-primary">
                <i class="ph-bold ph-plus-circle"></i>
                Створити кімнату
            </button>

            <button class="btn btn-secondary">
                <i class="ph-bold ph-users"></i>
                Свині-друзі
            </button>

            <button class="btn btn-secondary">
                <i class="ph-bold ph-book-open"></i>
                Правила гри
            </button>
        </div>

    </div>

</body>
</html>
