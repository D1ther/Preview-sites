<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Правда чи дія</title>
    
    <!-- Підключення шрифту Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Підключення мінімалістичних іконок Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* Базові налаштування */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: #0b0b0e; /* Глибокий темний колір */
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Вайбовий фоновий блюр (неонові плями) */
        .ambient-light-1, .ambient-light-2 {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            opacity: 0.4;
        }

        .ambient-light-1 {
            width: 400px;
            height: 400px;
            background: #8b5cf6; /* Фіолетовий */
            top: -100px;
            left: -100px;
        }

        .ambient-light-2 {
            width: 300px;
            height: 300px;
            background: #ec4899; /* Рожевий */
            bottom: -50px;
            right: -50px;
        }

        /* Контейнер меню */
        .menu-container {
            position: relative;
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 40px;
            width: 100%;
            max-width: 350px;
            padding: 20px;
        }

        /* Заголовок гри */
        .game-title {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffffff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        /* Контейнер кнопок */
        .buttons-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Загальний стиль кнопок */
        .menu-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px 24px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #e4e4e7;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px); /* Ефект матового скла */
        }

        .menu-btn i {
            font-size: 1.4rem;
        }

        /* Ефект при наведенні для звичайних кнопок */
        .menu-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Акцентна кнопка СТВОРИТИ КІМНАТУ */
        .btn-primary {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.5);
            color: #ddd6fe;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.15);
        }

        .btn-primary:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: rgba(139, 92, 246, 0.8);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.3);
            color: #ffffff;
        }

    </style>
</head>
<body>

    <!-- Фонові елементи для вайбу -->
    <div class="ambient-light-1"></div>
    <div class="ambient-light-2"></div>

    <div class="menu-container">
        <h1 class="game-title">Правда<br>чи дія</h1>
        
        <div class="buttons-wrapper">
            <!-- Головна кнопка (Акцентна) -->
            <button class="menu-btn btn-primary">
                <i class="ph ph-plus-circle"></i>
                Створити кімнату
            </button>

            <!-- Інші кнопки -->
            <button class="menu-btn">
                <i class="ph ph-sign-in"></i>
                Приєднатися
            </button>

            <button class="menu-btn">
                <i class="ph ph-book-open"></i>
                Правила гри
            </button>

            <button class="menu-btn">
                <i class="ph ph-gear"></i>
                Налаштування
            </button>
        </div>
    </div>

</body>
</html>
